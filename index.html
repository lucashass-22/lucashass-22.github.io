<html lang="en">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { --black: #080808; --cream: #f0ece4; --orange: #E8500A; }

html { scroll-behavior: smooth; }

body { background: var(--black); color: var(--cream); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.35;
}

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 28px 48px; }
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .15em; color: var(--cream); text-decoration: none; }
.nav-links { display: flex; gap: 40px; }
.nav-links a { font-size: .7rem; letter-spacing: .2em; color: var(--cream); text-decoration: none; opacity: .7; transition: opacity .2s; }
.nav-links a:hover { opacity: 1; }

.hero { position: relative; height: 100vh; min-height: 600px; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 48px 80px; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: url('hero-bg.png') 75% center / cover no-repeat; }
.hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,8,8,.85) 40%, rgba(8,8,8,.2) 100%), linear-gradient(to top, rgba(8,8,8,.7) 0%, transparent 60%); }
.hero-content { position: relative; z-index: 2; }
.hero-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 7vw, 90px); color: var(--orange); letter-spacing: .03em; line-height: .92; }
.hero-sub { display: flex; align-items: center; gap: 20px; margin-top: 20px; font-size: .72rem; letter-spacing: .22em; opacity: .75; }
.hero-sub::before { content: ''; display: block; width: 48px; height: 1px; background: var(--orange); flex-shrink: 0; }
.hero-scroll { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: .6rem; letter-spacing: .3em; opacity: .4; z-index: 2; }

.projects { padding: 100px 48px; }
.section-label { font-size: .65rem; letter-spacing: .3em; opacity: .4; margin-bottom: 60px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.card { position: relative; aspect-ratio: 16 / 10; overflow: hidden; cursor: pointer; background: #111; }
.card img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(.75) saturate(.8); transition: transform .6s ease, filter .6s ease; }
.card:hover img { transform: scale(1.04); filter: brightness(.5) saturate(.6); }
.card-info { position: absolute; inset: 0; padding: 24px; display: flex; flex-direction: column; justify-content: flex-end; background: linear-gradient(to top, rgba(8,8,8,.9) 0%, transparent 60%); }
.card-client { font-size: .6rem; letter-spacing: .25em; color: var(--orange); margin-bottom: 6px; }
.card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .06em; line-height: 1.1; }

.modal-overlay { position: fixed; inset: 0; background: rgba(8,8,8,.95); z-index: 200; display: flex; align-items: flex-start; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s; overflow-y: auto; padding: 80px 24px 60px; }
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal { width: 90%; max-width: 960px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.modal-media { grid-column: 1 / -1; }
.modal-video-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
.modal-video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.modal-image { width: 100%; display: block; }
.modal-placeholder { height: 300px; background: #111; display: flex; align-items: center; justify-content: center; font-size: .7rem; letter-spacing: .2em; opacity: .3; }
.modal-client { font-size: .6rem; letter-spacing: .25em; color: var(--orange); margin-bottom: 8px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: .05em; margin-bottom: 20px; line-height: 1; }
.modal-label { font-size: .6rem; letter-spacing: .2em; opacity: .4; margin-bottom: 6px; margin-top: 20px; }
.modal-text { font-size: .82rem; line-height: 1.7; opacity: .8; }
.modal-award { color: var(--orange); opacity: 1; }
.modal-close { position: fixed; top: 32px; right: 40px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: .1em; background: none; border: none; color: var(--cream); cursor: pointer; opacity: .5; transition: opacity .2s; z-index: 201; }
.modal-close:hover { opacity: 1; }

.contact { padding: 120px 48px; border-top: 1px solid rgba(240,236,228,.08); display: flex; align-items: center; justify-content: center; gap: 80px; }
.contact-photo { flex-shrink: 0; width: 320px; height: 400px; background: #1a1a1a; overflow: hidden; }
.contact-photo img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(20%); }
.contact-photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: .6rem; letter-spacing: .2em; opacity: .25; }
.contact-right { display: flex; flex-direction: column; align-items: flex-start; }
.contact-tag { font-size: .65rem; letter-spacing: .3em; opacity: .4; margin-bottom: 32px; }
.contact-heading { font-family: 'DM Serif Display', serif; font-size: clamp(36px, 4vw, 64px); font-style: italic; line-height: 1.1; margin-bottom: 48px; max-width: 500px; }
.contact-links { display: flex; gap: 48px; flex-wrap: wrap; }
.contact-link { font-size: .75rem; letter-spacing: .2em; color: var(--cream); text-decoration: none; border-bottom: 1px solid rgba(240,236,228,.2); padding-bottom: 4px; transition: color .2s, border-color .2s; }
.contact-link:hover { color: var(--orange); border-color: var(--orange); }

footer { padding: 28px 48px; border-top: 1px solid rgba(240,236,228,.06); display: flex; justify-content: space-between; align-items: center; }
footer span { font-size: .62rem; letter-spacing: .15em; opacity: .3; }

.fade-up { opacity: 0; transform: translateY(24px); transition: opacity .8s ease, transform .8s ease; }
.fade-up.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  nav { padding: 20px 24px; }
  .nav-links { gap: 24px; }
  .hero { padding: 0 24px 60px; }
  .projects { padding: 60px 24px; }
  .grid { grid-template-columns: 1fr; }
  .contact { flex-direction: column; padding: 80px 24px; gap: 40px; align-items: flex-start; }
  .contact-photo { width: 100%; height: 280px; }
  .contact-heading { font-size: clamp(28px, 8vw, 48px); }
  .contact-links { flex-direction: column; gap: 24px; }
  .modal { grid-template-columns: 1fr; gap: 24px; }
  .modal-title { font-size: 1.8rem; }
  .modal-close { top: 16px; right: 20px; }
  footer { padding: 20px 24px; flex-direction: column; gap: 8px; text-align: center; }
}
@media (max-width: 480px) {
  .nav-links a { font-size: .6rem; }
  .hero-sub { font-size: .6rem; letter-spacing: .12em; }
  .section-label { font-size: .6rem; }
  .modal-overlay { padding: 60px 16px 40px; }
}
</style>

    role: 'Senior Producer — led integrated campaign production.',
    scope: 'Oversaw cross-channel execution across brand, product, OOH, and stills, aligning creative teams and stakeholders to deliver a cohesive, culturally relevant message.',

var grid = document.getElementById('grid');

for (var i = 0; i < projects.length; i++) {
  (function(p, idx) {
    var card = document.createElement('div');
    card.className = 'card';

    var img = document.createElement('img');
    img.src = 'thumb-' + (idx + 1) + '.jpg';
    img.alt = p.title;
    img.onerror = function() { this.style.display = 'none'; };

    var info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = '<div class="card-client">' + p.client.toUpperCase() + '</div><div class="card-title">' + p.title + '</div>';

    card.appendChild(img);
    card.appendChild(info);
    card.addEventListener('click', function() { openModal(p); });
    grid.appendChild(card);
  })(projects[i], i);
}

function buildMedia(p) {
  if (p.mediaType === 'image') {
    return '<div class="modal-media"><img class="modal-image" src="' + p.embed + '" alt="' + p.title + '"/></div>';
  }
  if (p.mediaType === 'video' && p.embed) {
    return '<div class="modal-media"><div class="modal-video-wrap"><iframe src="' + p.embed + '" allow="autoplay; fullscreen" allowfullscreen></iframe></div></div>';
  }
  return '<div class="modal-media"><div class="modal-placeholder">IMAGERY COMING SOON</div></div>';
}

function openModal(p) {
  var overlay = document.getElementById('modalOverlay');
  var content = document.getElementById('modalContent');
  var awardHTML = p.award ? '<div class="modal-label">AWARD</div><div class="modal-text modal-award">' + p.award + '</div>' : '';
  content.innerHTML =
    buildMedia(p) +
    '<div>' +
      '<div class="modal-client">' + p.client.toUpperCase() + '</div>' +
      '<div class="modal-title">' + p.title + '</div>' +
      '<div class="modal-label">OVERVIEW</div>' +
      '<div class="modal-text">' + p.overview + '</div>' +
    '</div>' +
    '<div>' +
      '<div class="modal-label">ROLE</div>' +
      '<div class="modal-text">' + p.role + '</div>' +
      '<div class="modal-label">SCOPE</div>' +
      '<div class="modal-text">' + p.scope + '</div>' +
      '<div class="modal-label">RESULT</div>' +
      '<div class="modal-text">' + p.result + '</div>' +
      awardHTML +
    '</div>';
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) { closeModal(); }
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('modalContent').innerHTML = '';
  document.body.style.overflow = '';
}

var observer = new IntersectionObserver(function(entries) {
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].isIntersecting) { entries[i].target.classList.add('visible'); }
  }
}, { threshold: 0.15 });

var fadeEls = document.querySelectorAll('.fade-up');
for (var k = 0; k < fadeEls.length; k++) { observer.observe(fadeEls[k]); }

setTimeout(function() {
  var hero = document.querySelector('.hero-content');
  if (hero) { hero.classList.add('visible'); }
}, 100);
</script>
